<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="./assets/logo_mark.png">
<link rel="apple-touch-icon" href="./assets/logo_mark.png">
<title>404 — ページが見つかりません | AIKEY</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
<link href="https://fonts.cdnfonts.com/css/garet" rel="stylesheet">
<link href="https://fonts.cdnfonts.com/css/glacial-indifference-2" rel="stylesheet">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --black:#050505;
  --white:#efefef;
  --bright:#ffffff;
  --gray:#777777;
  --bd-dark:rgba(255,255,255,.07);
  --f-brand:'Garet','Arial Black',sans-serif;
  --f-mid:'Glacial Indifference','Arial',sans-serif;
  --f-body:'Noto Sans JP',sans-serif;
}

html,body{
  height:100%;
  font-family:var(--f-body);
  background:var(--black);
  color:var(--white);
}

body{
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  min-height:100vh;
  padding:2rem;
  text-align:center;
}

.num{
  font-family:var(--f-brand);font-weight:900;
  font-size:clamp(6rem,20vw,12rem);
  letter-spacing:.06em;line-height:1;
  color:rgba(255,255,255,.06);
  user-select:none;
}

.title{
  font-family:var(--f-mid);font-weight:700;
  font-size:.72rem;letter-spacing:.32em;text-transform:uppercase;
  color:var(--gray);margin-top:1.2rem;margin-bottom:2.5rem;
}

.btn{
  display:inline-block;
  padding:.75rem 2.2rem;
  font-family:var(--f-mid);font-weight:700;
  font-size:.72rem;letter-spacing:.2em;text-transform:uppercase;
  text-decoration:none;
  border:1px solid rgba(255,255,255,.3);color:var(--white);background:transparent;
  position:relative;overflow:hidden;transition:color .35s;
}
.btn::before{
  content:'';position:absolute;inset:0;background:var(--white);
  transform:translateY(101%);transition:transform .35s cubic-bezier(.76,0,.24,1);
}
.btn:hover::before{transform:translateY(0)}
.btn:hover{color:var(--black)}
.btn span{position:relative;z-index:1}
</style>
</head>
<body>

<div class="num">404</div>
<p class="title">Page Not Found</p>
<a href="./index.html" class="btn"><span>トップに戻る</span></a>

</body>
</html>
